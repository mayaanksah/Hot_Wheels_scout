name: scout

on:
  schedule:
    - cron: "*/5 * * * *"   # best-effort ~5 min; GitHub may delay at peak (D3 accepted)
  workflow_dispatch: {}      # manual force-check for known hot drops

permissions:
  contents: write            # to commit state.json back

concurrency:
  group: scout
  cancel-in-progress: false  # never kill a cycle mid cart-write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scout cycle
        env:
          PYTHONPATH: src
          # Monitored addresses are comma-separated (cart address first). A
          # provider is active only when it has both a token and addresses, so
          # Zepto stays dormant until its secrets are set.
          SWIGGY_TOKEN: ${{ secrets.SWIGGY_TOKEN }}
          SWIGGY_ADDRESS_IDS: ${{ secrets.SWIGGY_ADDRESS_IDS }}
          SWIGGY_CART_ADDRESS_ID: ${{ secrets.SWIGGY_CART_ADDRESS_ID }}
          SWIGGY_ADDRESS_ID: ${{ secrets.SWIGGY_ADDRESS_ID }}
          ZEPTO_TOKEN: ${{ secrets.ZEPTO_TOKEN }}
          ZEPTO_ADDRESS_IDS: ${{ secrets.ZEPTO_ADDRESS_IDS }}
          ZEPTO_CART_ADDRESS_ID: ${{ secrets.ZEPTO_CART_ADDRESS_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scout.main

      - name: Persist state.json
        run: |
          git config user.name "hot-wheels-scout[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update state [skip ci]"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
